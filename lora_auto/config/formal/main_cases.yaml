cases:
- id: MAIN-001
  suite: main
  feature: transparent_transfer
  scenario: SLEEP2 high-speed transparent transfer without and with shared KEY
  priority: P0
  automation_level: auto
  devices:
  - A
  - B
  preconditions:
  - Devices A, B are connected and can be configured for SLEEP2.
  - The formal transfer runner is responsible for applying the round configuration before
    each payload send.
  steps:
  - action: configure_transfer_round
    device: null
    command: null
    expected:
      mode: contains_all
      values:
      - OK
    transfer_type: transparent_transfer
    work_mode: SLEEP2
    key_mode: no_key
    shared_key: null
    roles:
      sender: A
      receivers:
      - B
    config:
      A:
        sleep: SLEEP2
        channel: '01'
        key: null
        mac: 00,01
      B:
        sleep: SLEEP2
        channel: '01'
        key: null
        mac: 00,02
  - action: send_plain_payload
    device: A
    command: ABCDEFGHIJKLMNOPQRSTUVWXYZ
    expected: null
    payload:
      payload: ABCDEFGHIJKLMNOPQRSTUVWXYZ
      encoding: plain_text
  - action: receive_payload
    device: B
    command: null
    expected:
      mode: contains
      value: ABCDEFGHIJKLMNOPQRSTUVWXYZ
  - action: configure_transfer_round
    device: null
    command: null
    expected:
      mode: contains_all
      values:
      - OK
    transfer_type: transparent_transfer
    work_mode: SLEEP2
    key_mode: shared_key
    shared_key: '123456'
    roles:
      sender: A
      receivers:
      - B
    config:
      A:
        sleep: SLEEP2
        channel: '01'
        key: '123456'
        mac: 00,01
      B:
        sleep: SLEEP2
        channel: '01'
        key: '123456'
        mac: 00,02
  - action: send_plain_payload
    device: A
    command: ABCDEFGHIJKLMNOPQRSTUVWXYZ
    expected: null
    payload:
      payload: ABCDEFGHIJKLMNOPQRSTUVWXYZ
      encoding: plain_text
  - action: receive_payload
    device: B
    command: null
    expected:
      mode: contains
      value: ABCDEFGHIJKLMNOPQRSTUVWXYZ
  expected:
  - B receive payload ABCDEFGHIJKLMNOPQRSTUVWXYZ in both no-KEY and shared-KEY rounds.
  result_policy:
    pass_when:
    - All configured no-KEY and shared-KEY transparent_transfer rounds deliver the expected
      payload to every receiver.
    fail_when:
    - Any transparent_transfer round misses the expected payload, uses mismatched device roles,
      or has inconsistent KEY configuration.
  evidence:
    serial_log: null
    logic_analyzer: null
    power_record: null
    rf_record: null
    manual_note: null
  metadata:
    source: formal-test-case-design-plan Phase 5
    manual_ref: null
    destructive: false
    state_changing: true
    run_policy: auto
    transfer_type: transparent_transfer
    work_mode: SLEEP2
    key_modes:
    - no_key
    - shared_key
    payload_encoding: plain_text
