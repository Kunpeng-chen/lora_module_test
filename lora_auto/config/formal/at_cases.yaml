    devices: [A]
    preconditions: [Device A is connected over serial and is in AT mode.]
    steps:
      - action: send_at
        device: A
        command: AT+BAUD
        expected: {mode: regex, value: "\\+BAUD=\\d+"}
    expected: [AT+BAUD response matches +BAUD=<baud>.]
    result_policy: *standard_policy
    evidence: *empty_evidence
    metadata:
      source: docs/manual/dx-lr31-900t22s-uart-application-guide.md
