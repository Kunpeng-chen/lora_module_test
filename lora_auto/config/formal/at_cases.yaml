    priority: P0
    automation_level: auto
    devices: [A]
    preconditions: [Device A is connected over serial and is already in AT mode.]
    steps:
      - action: exit_at
        device: A
        command: "+++"
        expected: {mode: contains, value: Exit AT}
    expected: [The module exits AT command mode and returns Exit AT. A Power On banner may follow.]
