cases:
  - id: AT-001
    suite: at
    feature: at_command
    scenario: Basic AT command responds with OK
    priority: P0
    automation_level: auto
    devices: [A]
    preconditions: [Device A is connected over serial and is in AT mode.]
    steps:
      - action: send_at
        device: A
        command: AT
        expected: {mode: contains, value: OK}
    expected: [AT command response contains OK.]
    result_policy:
      pass_when: [The documented expected response is observed.]
      fail_when: [The documented expected response is missing.]
    evidence: &empty_evidence
      serial_log: null
      logic_analyzer: null
      power_record: null
      rf_record: null
      manual_note: null
    metadata:
      source: docs/manual/dx-lr31-900t22s-uart-application-guide.md
      manual_ref: 5.1.2 测试指令
      destructive: false
      state_changing: false
      run_policy: auto

  - id: AT-002
    suite: at
    feature: at_command
    scenario: Enter AT command mode with +++
    priority: P0
    automation_level: auto
    devices: [A]
    preconditions: [Device A is connected over serial and starts in transfer mode.]
    steps:
      - action: enter_at
        device: A
        command: "+++"
        expected: {mode: contains, value: Entry AT}
    expected: [The module enters AT command mode and returns Entry AT.]
    result_policy: &standard_policy
      pass_when: [The documented expected response is observed.]
      fail_when: [The documented expected response is missing.]
    evidence: *empty_evidence
    metadata:
      source: docs/manual/dx-lr31-900t22s-uart-application-guide.md
      manual_ref: 5.1.1 进入或退出 AT 命令模式
      destructive: false
      state_changing: false
      run_policy: auto

